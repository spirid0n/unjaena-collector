[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marker definitions
markers =
    slow: Slow tests (requires E01 image)
    e2e: End-to-End tests
    unit: Unit tests
    integration: Integration tests

# Output options
addopts = -v --tb=short

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
